# render.yaml — Configuration de déploiement pour Render
# https://render.com/docs/yaml-spec
#
# IMPORTANT : Render ne fournit pas de runtime PHP natif.
# Un Dockerfile est nécessaire pour un déploiement production robuste
# avec PHP-FPM + Nginx. Ce fichier décrit la configuration de service.
# Voir : https://render.com/docs/deploy-php

services:
  - type: web
    name: badcalendar
    runtime: docker
    # Render sert le répertoire public/ comme document root (défini dans le Dockerfile)
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: badcalendar-db
          property: connectionString
      - key: MAILER_DSN
        value: null://null
      - key: MESSENGER_TRANSPORT_DSN
        value: doctrine://default?auto_setup=0
      - key: DEFAULT_URI
        fromService:
          name: badcalendar
          type: web
          property: host

databases:
  - name: badcalendar-db
    databaseName: boisguibad
    plan: free
